<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="5svg" />
    <meta name="description" content="5svg — SVG icons & vector resources" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="%sveltekit.assets%/images/svgl_svg.svg"
    />
    <link
      rel="icon"
      type="image/ico"
      href="%sveltekit.assets%/images/svgl_ico.ico"
    />

    <!-- OG Images -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="5SVG" />
    <meta
      property="og:description"
      content="5svg — SVG icons & vector resources"
    />
    <meta property="og:url" content="https://5svg.com" />
    <meta
      property="og:image"
      content="https://5svg.com/images/screenshot_dark.png"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="5SVG" />
    <meta
      name="twitter:description"
      content="5svg — SVG icons & vector resources"
    />
    <meta
      name="twitter:image"
      content="https://5svg.com/images/screenshot_dark.png"
    />

    <!-- Preload Fonts -->
    <link
      rel="preload"
      href="%sveltekit.assets%/fonts/Geist.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="%sveltekit.assets%/fonts/GeistMono.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />

    <!-- Manifest -->
    <link rel="manifest" href="%sveltekit.assets%/manifest.json" />

    <!-- Title -->
    <title>5svg — SVG icons & vector resources</title>
    %sveltekit.head%
  </head>
  <body
    class="overscroll-none bg-neutral-100 font-sans text-black antialiased selection:bg-neutral-300 dark:bg-neutral-950 dark:text-white dark:selection:bg-neutral-700"
    data-sveltekit-preload-data="hover"
  >
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
