<!doctype html>
<html lang="%lang%" dir="%dir%">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <script>
      (function () {
        var key = "mode-watcher-mode";
        var mode = localStorage.getItem(key) ?? "system";
        var light =
          mode === "light" ||
          (mode === "system" &&
            window.matchMedia("(prefers-color-scheme: light)").matches);
        var root = document.documentElement;
        if (light) root.classList.remove("dark");
        else root.classList.add("dark");
        root.style.colorScheme = light ? "light" : "dark";
      })();
    </script>
    %sveltekit.head%
  </head>
  <body
    class="overscroll-none bg-neutral-100 font-sans text-black antialiased selection:bg-neutral-300 dark:bg-neutral-950 dark:text-white dark:selection:bg-neutral-700"
    data-sveltekit-preload-data="hover"
  >
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
